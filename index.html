  { name: "Adventureland", icon: "🏴‍☠️", ground: "#243818", pathCol: "#987050", pathBdr: "#685030",

    blds: [
      {x:380,y:140,w:180,h:120,c:"#7B5914",r:"#9B7930",n:"Treehouse"},

    trees: [[280,280,22],[560,230,18],[1020,280,20],[1420,280,18],[130,550,22],[520,900,18],[1150,780,16],[1560,1180,20],[780,1230,18],[340,520,16],[1280,620,14],[980,380,16]],

const CREEP_EMJ = ["🧑","👩","👨","👧","👦","🧒","👴","👵","🧑‍🦰","👩‍🦱","👨‍🦳","👱","🧔","👲","🤠","👩‍🦰","🧕","🧑‍🦲","👶"];
const HERO_DATA = [
  {emoji:"🐭",name:"Mickey",c:"#ff4444"},
  {emoji:"🦆",name:"Donald",c:"#4488ff"},
  {emoji:"🐶",name:"Goofy",c:"#44bb44"},
  {emoji:"👸",name:"Elsa",c:"#88ccff"},
  {emoji:"🧞",name:"Genie",c:"#8844ff"},
  {emoji:"🦁",name:"Simba",c:"#ffaa22"},
  {emoji:"🧜‍♀️",name:"Ariel",c:"#22ccaa"},
  {emoji:"🤴",name:"Prince",c:"#cc8844"},
];

function dd(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function nr(x,y){const l=Math.hypot(x,y)||1;return[x/l,y/l]}

function ptOn(ps){
  const p=ps[Math.floor(Math.random()*ps.length)];
  const i=Math.floor(Math.random()*Math.max(1,p.length-1));
  const t=Math.random();
  return{x:p[i][0]+(p[Math.min(i+1,p.length-1)][0]-p[i][0])*t,
         y:p[i][1]+(p[Math.min(i+1,p.length-1)][1]-p[i][1])*t};
}

function mkNPC(id,ps,isHero,heroIdx){
  const pos=ptOn(ps);
  const pi=Math.floor(Math.random()*ps.length);
  const hd=isHero?HERO_DATA[heroIdx%HERO_DATA.length]:null;
  return{id,x:pos.x,y:pos.y,vx:0,vy:0,
    emoji:isHero?hd.emoji:CREEP_EMJ[id%CREEP_EMJ.length],
    pi,si:Math.floor(Math.random()*Math.max(1,ps[pi].length-1)),
    dir:Math.random()>0.5?1:-1,
    fly:false,ht:0,bob:Math.random()*Math.PI*2,
    sz:isHero?24:15+Math.random()*5,
    hero:isHero,heroName:isHero?hd.name:null,heroColor:isHero?hd.c:null,
    stunned:0,echoHit:false};
}

function mkDebris(b,cx,cy){
  const pcs=[];
  for(let i=0;i<10;i++){
    const px=b.x+Math.random()*b.w,py=b.y+Math.random()*b.h;
    const a=Math.atan2(py-cy,px-cx),sp=4+Math.random()*10;
    pcs.push({x:px,y:py,w:8+Math.random()*22,h:6+Math.random()*16,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,rot:0,rv:(Math.random()-0.5)*0.4,
      c:Math.random()>0.5?b.c:b.r,life:1});
  }
  return pcs;
}

function App(){
  const cvRef=useRef(null);
  const S=useRef({
    cam:{x:0,y:0},li:0,
    npcs:[],
    // Visual rings expanding from epicenter (the initial slam wave visual)
    slamWaves:[],
    // Echo waves: expanding rings from each hit unit
    echoWaves:[],
    // Aftershock ring
    aftershockWave:null,
    // Pending echoes to emit (delayed for visual clarity)
    pendingEchoes:[],
    dn:[],deb:[],cracks:[],
    dmg:0,slams:0,last:0,flash:0,shk:{x:0,y:0,t:0},
    destroyed:new Set(),
    stunIcons:[],
    comboLog:null,
  });
  const T=useRef({sx:0,sy:0,st:0,drag:false,cx:0,cy:0,on:false});
  const [ui,setUI]=useState({li:0,dmg:0,slams:0,menu:false,cd:false,echoCount:0,lastCombo:null});
  const raf=useRef(0);

  const init=useCallback((idx)=>{
    const s=S.current,l=LOCS[idx];
    s.li=idx;s.npcs=[];s.slamWaves=[];s.echoWaves=[];s.aftershockWave=null;
    s.pendingEchoes=[];s.dn=[];s.deb=[];s.cracks=[];s.stunIcons=[];
    s.flash=0;s.shk={x:0,y:0,t:0};s.destroyed=new Set();s.comboLog=null;
    const heroCount=3+Math.floor(Math.random()*3);
    for(let i=0;i<l.npc;i++){
      const isH=i<heroCount;
      s.npcs.push(mkNPC(i,l.paths,isH,i));
    }
    s.cam={x:W/2-window.innerWidth/2,y:H/2-window.innerHeight/2};
    setUI(u=>({...u,li:idx,menu:false,echoCount:0,lastCombo:null}));
  },[]);

  const doSlam=useCallback((wx,wy)=>{
    const s=S.current;
    if(Date.now()-s.last<2500)return;
    s.last=Date.now();s.slams++;s.flash=1;s.shk={x:0,y:0,t:1};

    // === AFTERSHOCK: instant small AoE at cast point ===
    s.aftershockWave={x:wx,y:wy,r:0,mr:AFTERSHOCK_R,a:1};
    let aftershockHits=0;
    s.npcs.forEach(npc=>{
      const d=dd({x:wx,y:wy},npc);
      if(d<AFTERSHOCK_R&&!npc.fly){
        npc.stunned=1.5;
        aftershockHits++;
        s.dmg+=AFTERSHOCK_DMG;
        s.dn.push({x:npc.x,y:npc.y-14,d:AFTERSHOCK_DMG,t:1,type:"aftershock"});
        s.stunIcons.push({x:npc.x,y:npc.y-20,t:1.5});
      }
    });

    // === ECHO SLAM: initial wave visual + hit all in radius ===
    s.slamWaves.push({x:wx,y:wy,r:0,mr:SLAM_R,spd:6,a:1});
    s.cracks.push({x:wx,y:wy,r:0,mr:240,lines:Array.from({length:14},()=>{
      const a=Math.random()*Math.PI*2;
      return{a,l:50+Math.random()*140,ox:(Math.random()-0.5)*30,oy:(Math.random()-0.5)*30};
    }),a:1});

    // Destroy buildings in radius
    const l=LOCS[s.li];
    l.blds.forEach((b,i)=>{
      if(s.destroyed.has(i))return;
      const d=Math.hypot(b.x+b.w/2-wx,b.y+b.h/2-wy);
      if(d<SLAM_R){s.destroyed.add(i);s.deb.push(...mkDebris(b,wx,wy));}
    });

    // Hit NPCs with initial slam damage — collect who was hit
    const hitUnits=[];
    s.npcs.forEach(npc=>{
      const d=dd({x:wx,y:wy},npc);
      if(d<SLAM_R){
        hitUnits.push(npc);
        npc.echoHit=false; // reset for echo phase
        // Initial slam damage
        s.dmg+=INITIAL_DMG;
        s.dn.push({x:npc.x,y:npc.y-8,d:INITIAL_DMG,t:1,type:"initial"});
        // Knockback from epicenter
        const [nx,ny]=nr(npc.x-wx,npc.y-wy);
        const force=KNOCKBACK*(1-d/SLAM_R+0.2);
        npc.vx+=nx*force;npc.vy+=ny*force;
        npc.fly=true;npc.ht=2.5;npc.stunned=1.5;
        s.stunIcons.push({x:npc.x,y:npc.y-20,t:1.2});
      }
    });

    // === SCHEDULE ECHOES: each hit unit emits echoes (heroes emit 2) ===
    let echoDelay=0.15;
    let totalEchoes=0;
    hitUnits.forEach(src=>{
      const numEchoes=src.hero?2:1;
      for(let e=0;e<numEchoes;e++){
        totalEchoes++;
        s.pendingEchoes.push({
          srcX:src.x,srcY:src.y,srcId:src.id,
          delay:echoDelay+e*0.12,
          hero:src.hero,echoIdx:e
        });
      }
      echoDelay+=0.04;
    });

    s.comboLog={units:hitUnits.length,echoes:totalEchoes,heroes:hitUnits.filter(u=>u.hero).length,t:3};

    if(navigator.vibrate)navigator.vibrate([60,15,60,15,120]);
    boom();
    setUI(u=>({...u,slams:s.slams,dmg:s.dmg,cd:true,echoCount:totalEchoes,
      lastCombo:{units:hitUnits.length,echoes:totalEchoes,heroes:hitUnits.filter(u=>u.hero).length}}));
    setTimeout(()=>setUI(u=>({...u,cd:false})),2500);
  },[]);

  const boom=()=>{try{
    const c=new(window.AudioContext||window.webkitAudioContext)(),n=c.currentTime;
    // Deep slam
    const o=c.createOscillator(),g=c.createGain();
    o.type="sine";o.frequency.setValueAtTime(50,n);o.frequency.exponentialRampToValueAtTime(14,n+0.8);
    g.gain.setValueAtTime(0.7,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.9);
    o.connect(g).connect(c.destination);o.start(n);o.stop(n+0.9);
    // Crack
    const o2=c.createOscillator(),g2=c.createGain();
    o2.type="sawtooth";o2.frequency.setValueAtTime(170,n);o2.frequency.exponentialRampToValueAtTime(20,n+0.3);
    g2.gain.setValueAtTime(0.3,n);g2.gain.exponentialRampToValueAtTime(0.001,n+0.35);
    o2.connect(g2).connect(c.destination);o2.start(n);o2.stop(n+0.4);
    // Echo hits sound
    for(let i=0;i<7;i++){
      const oo=c.createOscillator(),gg=c.createGain();
      oo.type="triangle";oo.frequency.setValueAtTime(90+i*18,n+0.15+i*0.06);
      oo.frequency.exponentialRampToValueAtTime(25,n+0.32+i*0.06);
      gg.gain.setValueAtTime(0.18-i*0.02,n+0.15+i*0.06);
      gg.gain.exponentialRampToValueAtTime(0.001,n+0.38+i*0.06);
      oo.connect(gg).connect(c.destination);oo.start(n+0.15+i*0.06);oo.stop(n+0.42+i*0.06);
    }
    // Noise
    const buf=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
    const ns=c.createBufferSource(),ng=c.createGain();ns.buffer=buf;ng.gain.setValueAtTime(0.2,n);
    ns.connect(ng).connect(c.destination);ns.start(n);
  }catch(e){}};

  useEffect(()=>{
    init(0);
    const cv=cvRef.current;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    let vw=window.innerWidth,vh=window.innerHeight;
    const resize=()=>{vw=window.innerWidth;vh=window.innerHeight;
      cv.width=vw*dpr;cv.height=vh*dpr;cv.style.width=vw+"px";cv.style.height=vh+"px";};
    resize();window.addEventListener("resize",resize);
    let lastTime=performance.now();

    const loop=(now)=>{
      const dt=Math.min((now-lastTime)/1000,0.05);
      lastTime=now;
      const s=S.current,l=LOCS[s.li];
      const ctx=cv.getContext("2d");
      ctx.setTransform(dpr,0,0,dpr,0,0);

      // === UPDATE ===
      if(s.shk.t>0){s.shk.t-=dt*2;s.shk.x=(Math.random()-0.5)*20*s.shk.t;s.shk.y=(Math.random()-0.5)*20*s.shk.t;}
      else{s.shk.x=0;s.shk.y=0;}
      if(s.flash>0)s.flash-=dt*2.5;

      // Slam waves (visual only — damage was instant)
      s.slamWaves.forEach(w=>{w.r+=w.spd;w.a=Math.max(0,1-w.r/w.mr);});
      s.slamWaves=s.slamWaves.filter(w=>w.r<w.mr);

      // Aftershock wave
      if(s.aftershockWave){
        const aw=s.aftershockWave;
        aw.r+=5;aw.a=Math.max(0,1-aw.r/aw.mr);
        if(aw.r>=aw.mr)s.aftershockWave=null;
      }

      // Process pending echoes
      s.pendingEchoes.forEach(pe=>{pe.delay-=dt;});
      const ready=s.pendingEchoes.filter(pe=>pe.delay<=0);
      s.pendingEchoes=s.pendingEchoes.filter(pe=>pe.delay>0);
      ready.forEach(pe=>{
        // Emit echo wave from this unit's position
        s.echoWaves.push({x:pe.srcX,y:pe.srcY,r:0,mr:ECHO_DMG_R,a:1,hero:pe.hero,processed:false});
      });

      // Echo waves expand and damage nearby non-source units
      s.echoWaves.forEach(ew=>{
        ew.r+=4.5;ew.a=Math.max(0,1-ew.r/ew.mr);
        // Damage units at the wavefront
        if(!ew.processed&&ew.r>ECHO_DMG_R*0.5){
          ew.processed=true;
          s.npcs.forEach(npc=>{
            const d=dd({x:ew.x,y:ew.y},npc);
            if(d<ECHO_DMG_R&&d>8){
              // Echo damage
              s.dmg+=ECHO_DMG;
              s.dn.push({x:npc.x+(Math.random()-0.5)*10,y:npc.y-12,d:ECHO_DMG,t:1,type:"echo"});
              // Small knockback from echo source
              const [nx,ny]=nr(npc.x-ew.x,npc.y-ew.y);
              npc.vx+=nx*4;npc.vy+=ny*4;
              if(!npc.fly){npc.fly=true;npc.ht=1.2;}
              setUI(u=>({...u,dmg:s.dmg}));
            }
          });
        }
      });
      s.echoWaves=s.echoWaves.filter(ew=>ew.r<ew.mr);

      // NPC movement
      s.npcs.forEach(npc=>{
        npc.bob+=dt*3.5;
        if(npc.stunned>0)npc.stunned-=dt;
        if(npc.fly){
          npc.x+=npc.vx;npc.y+=npc.vy;
          npc.vx*=FRICTION;npc.vy*=FRICTION;
          npc.ht-=dt;
          // Flying body collides with standing unit → knockback (body slam)
          if(Math.hypot(npc.vx,npc.vy)>1.2){
            s.npcs.forEach(o=>{
              if(o===npc||o.fly)return;
              if(dd(npc,o)<28){
                const [nx,ny]=nr(o.x-npc.x,o.y-npc.y);
                const sp=Math.hypot(npc.vx,npc.vy)*0.55;
                o.vx=nx*sp;o.vy=ny*sp;o.fly=true;o.ht=1.5;
                const dm=30+Math.floor(Math.random()*20);
                s.dmg+=dm;
                s.dn.push({x:o.x,y:o.y-10,d:dm,t:1,type:"collision"});
                setUI(u=>({...u,dmg:s.dmg}));
              }
            });
          }
          if(npc.ht<=0){npc.fly=false;npc.vx=0;npc.vy=0;
            npc.pi=Math.floor(Math.random()*l.paths.length);npc.si=0;
            npc.dir=Math.random()>0.5?1:-1;}
        }else if(npc.stunned<=0){
          const path=l.paths[npc.pi];if(!path||path.length<2)return;
          const ni=npc.si+npc.dir;
          if(ni<0||ni>=path.length){npc.dir*=-1;return;}

                animation:`fadeUp .3s ease-out ${i*.05}s both`,
                fontFamily:"'Chakra Petch',sans-serif",color:"#fff"}}>
              <span style={{fontSize:28}}>{l.icon}</span>
              <div><div style={{fontWeight:700,fontSize:14}}>{l.name}</div>
                <div style={{fontSize:10,opacity:.4}}>{l.npc} visitors · {l.blds.length} buildings</div></div>
              {i===ui.li&&<div style={{marginLeft:"auto",fontSize:10,color:l.accent,fontWeight:700}}>◆</div>}
            </div>))}
          <div onClick={()=>setUI(u=>({...u,menu:false}))}
            style={{marginTop:"auto",padding:13,borderRadius:12,background:"rgba(255,255,255,.05)",
              textAlign:"center",cursor:"pointer",fontWeight:700,opacity:.4,fontSize:12,color:"#fff",
              fontFamily:"'Chakra Petch',sans-serif"}}>CLOSE</div>
        </div>)}
    </div>);
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
